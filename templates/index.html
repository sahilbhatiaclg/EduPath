<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>EduPath - Home</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      color: #eee;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
    }
    h1 { font-size: 3rem; color: #00d4ff; margin-bottom: 10px; }
    p  { font-size: 1.1rem; color: #aaa; margin-bottom: 40px; }
    .btn-group { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; }
    .btn {
      padding: 14px 32px;
      border-radius: 8px;
      text-decoration: none;
      font-size: 1rem;
      font-weight: bold;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .btn:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0,212,255,0.3); }
    .btn-primary { background: #00d4ff; color: #000; }
    .btn-secondary { background: transparent; border: 2px solid #00d4ff; color: #00d4ff; }
  </style>
</head>
<body>
  <h1>🎓 EduPath</h1>
  <p>Student Placement & Analytics Web Application</p>
  <div class="btn-group">
    <a href="/register" class="btn btn-primary">📝 Register Student</a>
    <a href="/dashboard" class="btn btn-secondary">📊 View Dashboard</a>
  </div>
</body>
</html>
